name: Frontend CI

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'apps/admin/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'apps/admin/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'

jobs:
  web-lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Web
        run: pnpm -C apps/web lint || true

      - name: Build Web
        run: pnpm -C apps/web build

  admin-lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Admin
        run: pnpm -C apps/admin lint || true

      - name: Build Admin
        run: pnpm -C apps/admin build
