name: Frontend CI

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'apps/admin/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'apps/admin/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  web-lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint Web
        run: npm run lint -w apps/web || true

      - name: Build Web
        run: npm run build -w apps/web

  admin-lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint Admin
        run: npm run lint -w apps/admin || true

      - name: Build Admin
        run: npm run build -w apps/admin
