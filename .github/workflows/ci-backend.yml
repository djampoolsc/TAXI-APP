name: Backend CI

on:
  pull_request:
    paths:
      - 'apps/backend/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: axiom_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -w apps/backend

      - name: Type check
        run: npm run type-check -w apps/backend

      - name: Test
        run: npm run test -w apps/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/axiom_test

      - name: Build
        run: npm run build -w apps/backend
