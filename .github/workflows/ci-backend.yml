name: Backend CI

on:
  pull_request:
    paths:
      - 'apps/backend/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: axiom_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -C apps/backend lint

      - name: Type check
        run: pnpm -C apps/backend type-check

      - name: Test
        run: pnpm -C apps/backend test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/axiom_test

      - name: Build
        run: pnpm -C apps/backend build
